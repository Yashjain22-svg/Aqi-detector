<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VayuPath — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --bg: #050a14;
      --surface: #0c1525;
      --border: rgba(0,200,150,0.15);
      --accent: #00e5a0;
      --accent2: #00b4d8;
      --text: #e8f4f0;
      --muted: #5a7a70;
      --danger: #ff4d6d;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* === LEFT PANEL === */
    .left-panel {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 3rem;
      overflow: hidden;
    }

    .left-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 70% at 30% 50%, rgba(0,229,160,0.08) 0%, transparent 70%),
                  radial-gradient(ellipse 60% 60% at 70% 20%, rgba(0,180,216,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Animated grid */
    .grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,160,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 40% 50%, black 30%, transparent 80%);
    }

    /* Floating AQI orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.15;
      animation: float 8s ease-in-out infinite;
    }
    .orb-1 { width: 300px; height: 300px; background: #00e5a0; top: 10%; left: 5%; animation-delay: 0s; }
    .orb-2 { width: 200px; height: 200px; background: #00b4d8; bottom: 15%; right: 10%; animation-delay: 3s; }
    .orb-3 { width: 150px; height: 150px; background: #ff4d6d; top: 50%; left: 40%; animation-delay: 5s; opacity: 0.08; }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    .brand-area {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .logo-mark {
      width: 90px;
      height: 90px;
      margin: 0 auto 1.5rem;
      position: relative;
    }

    .logo-mark svg {
      width: 100%;
      height: 100%;
    }

    .brand-name {
      font-family: 'Syne', sans-serif;
      font-size: 3.5rem;
      font-weight: 800;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #00e5a0 0%, #00b4d8 50%, #00e5a0 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
    }

    @keyframes shimmer {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    .brand-tagline {
      color: var(--muted);
      font-size: 1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 0.5rem;
      font-weight: 300;
    }

    .feature-pills {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-top: 3rem;
    }

    .pill {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1.25rem;
      background: rgba(0,229,160,0.05);
      border: 1px solid rgba(0,229,160,0.1);
      border-radius: 50px;
      font-size: 0.875rem;
      color: var(--muted);
      transition: all 0.3s;
      animation: slideInLeft 0.6s ease forwards;
      opacity: 0;
      transform: translateX(-20px);
    }

    .pill:nth-child(1) { animation-delay: 0.3s; }
    .pill:nth-child(2) { animation-delay: 0.5s; }
    .pill:nth-child(3) { animation-delay: 0.7s; }
    .pill:nth-child(4) { animation-delay: 0.9s; }

    @keyframes slideInLeft {
      to { opacity: 1; transform: translateX(0); }
    }

    .pill-icon { font-size: 1.1rem; }

    /* === RIGHT PANEL === */
    .right-panel {
      width: 480px;
      min-height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3rem 3.5rem;
      position: relative;
    }

    .right-panel::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 1px;
      height: 100%;
      background: linear-gradient(180deg, transparent, var(--accent), transparent);
      opacity: 0.3;
    }

    .form-header {
      margin-bottom: 2.5rem;
    }

    .form-header h2 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
    }

    .form-header p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 0.4rem;
    }

    /* Tab switcher */
    .tab-switcher {
      display: flex;
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 2rem;
      border: 1px solid var(--border);
    }

    .tab-btn {
      flex: 1;
      padding: 0.6rem;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.25s;
    }

    .tab-btn.active {
      background: var(--accent);
      color: #050a14;
      font-weight: 600;
    }

    /* Form fields */
    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      color: var(--muted);
      pointer-events: none;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 0.85rem 1rem 0.85rem 2.8rem;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: all 0.25s;
    }

    input:focus {
      border-color: var(--accent);
      background: rgba(0,229,160,0.04);
      box-shadow: 0 0 0 3px rgba(0,229,160,0.08);
    }

    input::placeholder { color: var(--muted); opacity: 0.6; }

    .submit-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #050a14;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 0.5rem;
      position: relative;
      overflow: hidden;
    }

    .submit-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 30px rgba(0,229,160,0.3); }
    .submit-btn:hover::after { opacity: 0.08; }
    .submit-btn:active { transform: translateY(0); }

    .submit-btn .btn-loading {
      display: none;
    }

    .submit-btn.loading .btn-text { display: none; }
    .submit-btn.loading .btn-loading { display: inline; }

    .divider {
      text-align: center;
      position: relative;
      margin: 1.5rem 0;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .demo-btn {
      width: 100%;
      padding: 0.8rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.25s;
    }

    .demo-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,229,160,0.04);
    }

    .error-msg {
      color: var(--danger);
      font-size: 0.82rem;
      margin-top: 0.4rem;
      display: none;
    }

    .error-msg.show { display: block; }

    .global-error {
      background: rgba(255,77,109,0.1);
      border: 1px solid rgba(255,77,109,0.3);
      border-radius: 8px;
      padding: 0.7rem 1rem;
      color: var(--danger);
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }

    .global-error.show { display: block; }

    .success-msg {
      background: rgba(0,229,160,0.1);
      border: 1px solid rgba(0,229,160,0.3);
      border-radius: 8px;
      padding: 0.7rem 1rem;
      color: var(--accent);
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }

    .success-msg.show { display: block; }

    @media (max-width: 768px) {
      .left-panel { display: none; }
      .right-panel { width: 100%; padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

<!-- LEFT PANEL: Brand -->
<div class="left-panel">
  <div class="grid-bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="brand-area">
    <!-- Logo Mark -->
    <div class="logo-mark">
      <svg viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="45" cy="45" r="42" stroke="url(#g1)" stroke-width="2" opacity="0.4"/>
        <circle cx="45" cy="45" r="32" stroke="url(#g1)" stroke-width="1.5" opacity="0.3"/>
        <!-- Wind/Air lines -->
        <path d="M20 35 Q35 28 50 35 Q65 42 75 35" stroke="#00e5a0" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.9"/>
        <path d="M15 45 Q32 37 48 45 Q64 53 75 45" stroke="#00b4d8" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.8"/>
        <path d="M20 55 Q35 48 50 55 Q65 62 72 55" stroke="#00e5a0" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
        <!-- Location pin -->
        <circle cx="45" cy="45" r="6" fill="#00e5a0"/>
        <circle cx="45" cy="45" r="3" fill="#050a14"/>
        <defs>
          <linearGradient id="g1" x1="3" y1="3" x2="87" y2="87">
            <stop offset="0%" stop-color="#00e5a0"/>
            <stop offset="100%" stop-color="#00b4d8"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <div class="brand-name">VayuPath</div>
    <div class="brand-tagline">AQI Smart Route Optimizer</div>

    <div class="feature-pills">
      <div class="pill"><span class="pill-icon">🌬️</span> Real-time Air Quality Intelligence</div>
      <div class="pill"><span class="pill-icon">🗺️</span> Multi-route AQI Comparison</div>
      <div class="pill"><span class="pill-icon">🏥</span> Nearest Hospital Locator</div>
      <div class="pill"><span class="pill-icon">🤖</span> AI-powered AQI Predictions</div>
    </div>
  </div>
</div>

<!-- RIGHT PANEL: Auth Form -->
<div class="right-panel">
  <div class="form-header">
    <h2>Welcome back</h2>
    <p>Sign in to your VayuPath account</p>
  </div>

  <div class="tab-switcher">
    <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
    <button class="tab-btn" onclick="switchTab('register')">Create Account</button>
  </div>

  <div id="global-error" class="global-error"></div>
  <div id="global-success" class="success-msg"></div>

  <!-- LOGIN FORM -->
  <div id="login-form">
    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrap">
        <span class="input-icon">✉️</span>
        <input type="email" id="login-email" placeholder="you@example.com" />
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="login-password" placeholder="Enter your password" />
      </div>
    </div>
    <button class="submit-btn" onclick="doLogin()">
      <span class="btn-text">Sign In →</span>
      <span class="btn-loading">Signing in...</span>
    </button>

    <div class="divider">or</div>
    <button class="demo-btn" onclick="demoLogin()">🚀 Continue with Demo Account</button>
  </div>

  <!-- REGISTER FORM -->
  <div id="register-form" style="display:none">
    <div class="form-group">
      <label>Full Name</label>
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input type="text" id="reg-username" placeholder="Your name" />
      </div>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrap">
        <span class="input-icon">✉️</span>
        <input type="email" id="reg-email" placeholder="you@example.com" />
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="reg-password" placeholder="At least 6 characters" />
      </div>
    </div>
    <button class="submit-btn" onclick="doRegister()">
      <span class="btn-text">Create Account →</span>
      <span class="btn-loading">Creating account...</span>
    </button>
  </div>
</div>

<script>
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => {
      b.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='register'));
    });
    document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
    clearMessages();
  }

  function showError(msg) {
    const el = document.getElementById('global-error');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('global-success').classList.remove('show');
  }

  function showSuccess(msg) {
    const el = document.getElementById('global-success');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('global-error').classList.remove('show');
  }

  function clearMessages() {
    document.getElementById('global-error').classList.remove('show');
    document.getElementById('global-success').classList.remove('show');
  }

  async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) { showError('Please fill in all fields'); return; }

    const btn = document.querySelector('#login-form .submit-btn');
    btn.classList.add('loading');
    clearMessages();

    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (data.success) {
        showSuccess(`Welcome back, ${data.username}! Redirecting...`);
        setTimeout(() => window.location.href = '/', 1000);
      } else {
        showError(data.error || 'Login failed');
      }
    } catch(e) {
      showError('Network error. Please try again.');
    }
    btn.classList.remove('loading');
  }

  async function doRegister() {
    const username = document.getElementById('reg-username').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    if (!username || !email || !password) { showError('Please fill in all fields'); return; }

    const btn = document.querySelector('#register-form .submit-btn');
    btn.classList.add('loading');
    clearMessages();

    try {
      const res = await fetch('/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ username, email, password })
      });
      const data = await res.json();
      if (data.success) {
        showSuccess(`Account created! Welcome, ${data.username}!`);
        setTimeout(() => window.location.href = '/', 1200);
      } else {
        showError(data.error || 'Registration failed');
      }
    } catch(e) {
      showError('Network error. Please try again.');
    }
    btn.classList.remove('loading');
  }

  function demoLogin() {
    document.getElementById('login-email').value = 'demo@vayupath.com';
    document.getElementById('login-password').value = 'demo123';
    doLogin();
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const activeForm = document.getElementById('login-form').style.display !== 'none' ? 'login' : 'register';
      if (activeForm === 'login') doLogin();
      else doRegister();
    }
  });
</script>
</body>
</html>
